<!DOCTYPE html>
<html>
  <head>
    <title>List Activities</title>
    <style>
      body {
        background-color: #0a1a2e;
        color: white;
        font-family: Arial, sans-serif;
      }

      h1 {
        color: #00cfdd;
      }

      ol.main {
        color: #00cfdd;
      }

      ol.topic {
        color: #7ee8f0;
      }

      ul.subtopic {
        color: white;
      }

      ol.subtopic {
        color: white;
      }

      ul.mini {
        color: #aad4f5;
      }
    </style>
  </head>
  
  <body>
      <h1>LISTS</h1>
      <ol class="main">
        <li>Main Topic 1</li>
        <li>Main Topic 2</li>
        <ol class="topic">
          <li>Topic 1</li>
          <li>Topic 2</li>
          <ul class="subtopic">
            <li>Subtopic 1</li>
            <li>Subtopic 2</li>
          </ul>
          <li>Topic 3</li>
          <ol class="subtopic">
            <li>Subtopic 1</li>
            <li>Subtopic 2</li>
            <ul class="mini">
              <li>minitopic 1</li>
              <li>mini topic 2</li>
            </ul>
            <li>Subtopic 3</li>
          </ol>
        </ol>
        <li>Main Topic 3</li>
      </ol>
  </body>
</html>
